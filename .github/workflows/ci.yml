name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      # Fails if schema.ts changed without a generated migration.
      - name: Migration drift
        run: npx drizzle-kit check

      # PGlite runs in-process — no service containers, no secrets, no network.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build
